name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run data generators
        run: ./gradlew runData --stacktrace

      - name: Verify generated resources are up to date
        run: |
          if [ -n "$(git status --porcelain -- src/generated/resources)" ]; then
            echo "Generated resources are out of date. Run ./gradlew runData and commit the changes."
            git status --short -- src/generated/resources
            exit 1
          fi

      - name: Build with Gradle
        run: ./gradlew build --stacktrace
