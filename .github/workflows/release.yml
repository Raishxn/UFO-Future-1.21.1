name: Release

on:
  push:
    tags:
      - "v*"
      - "2.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read mod version
        id: version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run data generators
        run: ./gradlew runData --stacktrace

      - name: Verify generated resources are up to date
        run: |
          if [ -n "$(git status --porcelain -- src/generated/resources)" ]; then
            echo "Generated resources are out of date. Run ./gradlew runData and commit the changes."
            git status --short -- src/generated/resources
            exit 1
          fi

      - name: Build with Gradle
        run: ./gradlew build --stacktrace

      - name: Generate checksums
        run: sha256sum build/libs/*.jar > build/libs/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ufo-future-${{ steps.version.outputs.value }}
          path: |
            build/libs/*.jar
            build/libs/SHA256SUMS

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar
            build/libs/SHA256SUMS
