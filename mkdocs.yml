site_name: UFO Future Documentation
site_url: https://raishxn.github.io/UFO-Future-1.21.1/
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: purple
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Portugues
          build: true
          nav_translations:
            Home: Inicio
            Wiki: Wiki
            Mega Storage: Mega Storage
            Containment: Contencao
            Stellar Nexus: Stellar Nexus
            Dimensional Matter Assembler: Montador de Materia Dimensional
            Quantum Matter Fabricator: Quantum Matter Fabricator
            Quantum Slicer: Quantum Slicer
            Quantum Processor Assembler: Quantum Processor Assembler
            Multiblock Tiers: Tiers de Multibloco
            Catalysts: Catalisadores
            KubeJS Recipes: Receitas KubeJS
            Tools & Weapons: Ferramentas e Armas
            Armor Sets: Conjuntos de Armadura
            Storage Cells: Celulas de Armazenamento
            Materials & Fluids: Materiais e Fluidos
            Crafting Progression: Progressao
            Recipe Balance Audit: Auditoria de Balanceamento
        - locale: es
          name: Espanol
          build: true
          nav_translations:
            Home: Inicio
            Wiki: Wiki
            Mega Storage: Mega Storage
            Containment: Contencion
            Stellar Nexus: Stellar Nexus
            Dimensional Matter Assembler: Ensamblador de Materia Dimensional
            Quantum Matter Fabricator: Quantum Matter Fabricator
            Quantum Slicer: Quantum Slicer
            Quantum Processor Assembler: Quantum Processor Assembler
            Multiblock Tiers: Niveles de Multibloque
            Catalysts: Catalizadores
            KubeJS Recipes: Recetas KubeJS
            Tools & Weapons: Herramientas y Armas
            Armor Sets: Conjuntos de Armadura
            Storage Cells: Celdas de Almacenamiento
            Materials & Fluids: Materiales y Fluidos
            Crafting Progression: Progresion
