site_name: UFO Future Documentation
site_url: https://raishxn.github.io/UFO-Future-1.21.1/
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: purple
  features:
    - navigation.tabs
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true
          nav_translations:
            Home: Início
            Wiki: Wiki
            Stellar Nexus: Stellar Nexus
            Dimensional Matter Assembler: Montador de Matéria Dimensional
            Quantum Matter Fabricator: Quantum Matter Fabricator
            Quantum Slicer: Quantum Slicer
            Quantum Processor Assembler: Quantum Processor Assembler
            Multiblock Tiers: Tiers de Multibloco
            Catalysts: Catalisadores
            KubeJS Recipes: Receitas KubeJS
            Tools & Weapons: Ferramentas e Armas
            Armor Sets: Conjuntos de Armadura
            Storage Cells: Células de Armazenamento
            Materials & Fluids: Materiais e Fluidos
            Crafting Progression: Progressão
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Wiki: Wiki
            Stellar Nexus: Stellar Nexus
            Dimensional Matter Assembler: Ensamblador de Materia Dimensional
            Quantum Matter Fabricator: Quantum Matter Fabricator
            Quantum Slicer: Quantum Slicer
            Quantum Processor Assembler: Quantum Processor Assembler
            Multiblock Tiers: Niveles de Multibloque
            Catalysts: Catalizadores
            KubeJS Recipes: Recetas KubeJS
            Tools & Weapons: Herramientas y Armas
            Armor Sets: Conjuntos de Armadura
            Storage Cells: Celdas de Almacenamiento
            Materials & Fluids: Materiales y Fluidos
            Crafting Progression: Progresión
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Wiki: Wiki
            Stellar Nexus: Stellar Nexus
            Dimensional Matter Assembler: 维度物质装配器
            Quantum Matter Fabricator: Quantum Matter Fabricator
            Quantum Slicer: Quantum Slicer
            Quantum Processor Assembler: Quantum Processor Assembler
            Multiblock Tiers: Multiblock Tiers
            Catalysts: 催化剂
            KubeJS Recipes: KubeJS 配方
            Tools & Weapons: 工具与武器
            Armor Sets: 护甲套装
            Storage Cells: 存储单元
            Materials & Fluids: 材料与流体
            Crafting Progression: 合成进阶

nav:
  - Home: index.md
  - Wiki:
    - Stellar Nexus: stellar-nexus.md
    - Dimensional Matter Assembler: dma.md
    - Quantum Matter Fabricator: quantum-matter-fabricator.md
    - Quantum Slicer: quantum-slicer.md
    - Quantum Processor Assembler: quantum-processor-assembler.md
    - Multiblock Tiers: multiblock-tiers.md
    - Catalysts: catalysts.md
    - KubeJS Recipes: kubejs-recipes.md
    - Tools & Weapons: tools.md
    - Armor Sets: armor.md
    - Storage Cells: storage-cells.md
    - Materials & Fluids: materials.md
    - Crafting Progression: progression.md
